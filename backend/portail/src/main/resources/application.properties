spring.application.name=portail

server.port=8081

# ── Base de données H2 (développement) ────────────────────────────────────────
# Pour passer en MySQL : commenter le bloc H2, décommenter MySQL
spring.datasource.url=jdbc:h2:mem:ucadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL (production — décommenter) ──────────────────────────────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/uca_portail?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=secret

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── JWT ────────────────────────────────────────────────────────────────────────
# Clé secrète base64 (256 bits minimum) — CHANGER EN PRODUCTION
app.jwt.secret=dW5lQ2xlU2VjcmV0ZVRyZXNMb25ndWVQb3VyVUNBUG9ydGFpbDIwMjQ=
app.jwt.expiration-ms=86400000

# ── CORS ───────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ── Données d'initialisation (DataLoader) ─────────────────────────────────────
app.init.admin-email=admin@uca.ac.ma
app.init.admin-password=Admin123