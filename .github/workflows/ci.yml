name: CI/CD Frontend — Activités Universitaires uca

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/**'

jobs:

  # ─────────────────────────────────────
  # JOB 1 : Tests Jest
  # ─────────────────────────────────────
  tests:
    name: Tests Jest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: ./frontend
        run: npm ci

      - name: Lancement des tests Jest
        working-directory: ./frontend
        run: npm test -- --watchAll=false --coverage
        env:
          CI: true

      - name: Upload rapport de coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 7

  # ─────────────────────────────────────
  # JOB 2 : Build
  # ─────────────────────────────────────
  build:
    name: Build React
    runs-on: ubuntu-latest
    needs: tests          # attend que les tests passent avant de builder

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: ./frontend
        run: npm ci

      - name: Build de production
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      - name: Sauvegarde du build
        uses: actions/upload-artifact@v4
        with:
          name: build-frontend
          path: frontend/build/
          retention-days: 1

  # ─────────────────────────────────────
  # JOB 3 : Deploy GitHub Pages
  # (seulement sur push main, pas sur PR)
  # ─────────────────────────────────────
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build          # attend que le build soit OK
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write     # nécessaire pour push sur gh-pages

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: ./frontend
        run: npm ci

      - name: Build de production
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      - name: Deploy sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          publish_branch: gh-pages