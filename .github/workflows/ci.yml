      # 2. Installe Node.js version 18
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'          # met en cache node_modules pour aller plus vite

      # 3. Installe les dépendances
      - name: Installation des dépendances
        run: npm ci               # npm ci = plus strict que npm install, parfait pour CI

      # 4. Lance tous les tests Jest
      - name: Lancement des tests Jest
        run: npm test -- --watchAll=false --coverage
        env:
          CI: true               # nécessaire pour CRA en mode CI

      # 5. Build de production
      - name: Build de production
        run: npm run build
        env:
