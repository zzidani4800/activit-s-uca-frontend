name: CI/CD Frontend — Université Cadi Ayyad

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  

jobs:

  # ─────────────────────────────────────
  # JOB 1 : Tests Jest
  # ─────────────────────────────────────
  tests:
    name: Tests Jest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: ./frontend
        run: npm ci

      - name: Vérifier la config setupTests
        working-directory: ./frontend
        run: |
          echo "=== Contenu setupTests.js ==="
          cat src/setupTests.js || echo "FICHIER MANQUANT"
          echo "=== Section jest dans package.json ==="
          cat package.json | grep -A 5 '"jest"' || echo "Pas de config jest"

      - name: Lancement des tests Jest
        working-directory: ./frontend
        run: npm test -- --watchAll=false --coverage --forceExit
        env:
          CI: true

      - name: Upload rapport de coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage/
          retention-days: 7

  # ─────────────────────────────────────
  # JOB 2 : Build
  # ─────────────────────────────────────
  build:
    name: Build React
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: ./frontend
        run: npm ci

      - name: Build de production
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      - name: Sauvegarde du build
        uses: actions/upload-artifact@v4
        with:
          name: build-frontend
          path: frontend/build/
          retention-days: 1

  # ─────────────────────────────────────
  # JOB 3 : Deploy GitHub Pages
  # ─────────────────────────────────────
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: ./frontend
        run: npm ci

      - name: Build de production
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false

      - name: Deploy sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          publish_branch: gh-pages